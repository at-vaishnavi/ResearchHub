<!DOCTYPE html>
<html lang="en" ng-app="researchApp">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plagiarism Check - ResearchHub</title>

    <link rel="stylesheet" href="../css/style.css">

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <script src="../js/app.js"></script>
</head>

<body>

    <nav>
        <h2>ResearchHub</h2>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="publications.html">Publications</a></li>
            <li><a href="plagiarism.html" class="active">Plagiarism Check</a></li>
            <li><a href="register.html">Register-Form</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>


    <section class="plag-hero">
        <h1>Plagiarism & <span>AI Detection</span></h1>
        <p>Ensure originality and maintain academic integrity before submitting your research work.</p>
    </section>

    <section class="plagiarism-section" ng-controller="plagController">
        <div class="plag-container">

            <textarea ng-model="plagText" placeholder="Paste your research text here..."></textarea>

            <br><br>

            <label>Upload File:</label><br>
            <input type="file">

            <br><br>

            <label>Or Enter Website Link:</label>
            <input type="url" ng-model="plagURL" placeholder="https://example.com">

            <br>

            <button ng-click="checkPlagiarism()">Check Plagiarism & AI</button>

            <div ng-if="result" class="result-box"
                ng-class="{'eligible': eligibility === 'eligible', 'not-eligible': eligibility === 'not-eligible'}">
                {{result}} <br>
                {{eligibilityMsg}}
            </div>

        </div>
    </section>

    <footer>
        © 2026 ResearchHub. All Rights Reserved.
    </footer>

</body>

</html>
